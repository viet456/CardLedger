server {
    listen 80;
    server_name sync.cardledger.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sync.cardledger.io;

    ssl_certificate /etc/letsencrypt/live/sync.cardledger.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sync.cardledger.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Docker internal DNS resolver (required for resolving container hostnames)
    resolver 127.0.0.11 valid=30s;

    location / {
        set $backend http://sync-server:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CRITICAL FOR SSE: Force Nginx to stream, not buffer
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Keep the connection alive for a very long time (24 hours)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
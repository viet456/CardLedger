name: Update Market Stats

on:
    schedule:
        # Run twice daily at Midnight and 9 AM UTC (4PM and 1 AM PST)
        - cron: '0 0,9 * * *'
    workflow_dispatch:

jobs:
    update-stats:
        runs-on: ubuntu-latest
        timeout-minutes: 95

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js and cache pnpm store
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate Prisma Client
              run: pnpm prisma generate
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}

            - name: Run market stats update
              run: pnpm tsx scripts/updateMarketStats.ts
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  POKEPRICETRACKER_KEY: ${{ secrets.POKEPRICETRACKER_KEY }}
                  REVALIDATION_TOKEN: ${{ secrets.REVALIDATION_TOKEN }}
                  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
                  NEXT_PUBLIC_R2_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_R2_PUBLIC_URL }}

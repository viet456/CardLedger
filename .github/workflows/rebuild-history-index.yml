name: Rebuild History Index (Maintenance)

on:
    schedule:
        # Run at 2 AM UTC every Sunday
        - cron: '0 2 * * 0'
    workflow_dispatch:

jobs:
    rebuild-history:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js and cache pnpm store
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate Prisma Client
              run: pnpm prisma generate
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}

            - name: Run full history index build
              run: pnpm tsx scripts/generateHistoryIndex.ts
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
                  NEXT_PUBLIC_R2_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_R2_PUBLIC_URL }}
